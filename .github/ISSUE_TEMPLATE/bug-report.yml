name: "🐞 Bug Report"
description: "Report a bug or unexpected behavior"
title: "[BUG] "
labels: ["bug"]
assignees: ["NEO1842"]

body:
  - type: textarea
    attributes:
      label: "🐛 What happened?"
      description: "Describe the issue clearly"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "🎯 Expected behavior"
      description: "What should have happened?"

  - type: textarea
    attributes:
      label: "🧪 Steps to reproduce"
      description: "How can we reproduce it?"

  - type: textarea
    attributes:
      label: "💻 Environment"
      description: "OS / Node / Electron version etc."
