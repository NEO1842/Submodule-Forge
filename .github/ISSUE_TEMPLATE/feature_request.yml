name: "✨ Feature Request"
description: "Suggest a new feature or improvement"
title: "[FEATURE] "
labels: ["enhancement"]
assignees: ["NEO1842"]

body:
  - type: textarea
    attributes:
      label: "💡 Problem"
      description: "What problem does this solve?"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "🚀 Proposed Solution"
      description: "Describe your idea"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "🔄 Alternatives"
      description: "Any alternative solutions?"

  - type: textarea
    attributes:
      label: "📸 Additional Context"
      description: "Screenshots or extra info"
